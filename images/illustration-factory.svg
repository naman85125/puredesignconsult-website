<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Hardware factory floor illustration">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f6f5f2"/>

  <!-- Floor perspective grid -->
  <g stroke="#dcd8d0" stroke-width="1">
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <!-- Receding floor lines -->
    <line x1="0" y1="900" x2="600" y2="600"/>
    <line x1="200" y1="900" x2="650" y2="600"/>
    <line x1="400" y1="900" x2="700" y2="600"/>
    <line x1="600" y1="900" x2="600" y2="600"/>
    <line x1="800" y1="900" x2="700" y2="600"/>
    <line x1="1000" y1="900" x2="750" y2="600"/>
    <line x1="1200" y1="900" x2="800" y2="600"/>
    <!-- Horizontal floor lines -->
    <line x1="100" y1="700" x2="1100" y2="700"/>
    <line x1="200" y1="800" x2="1000" y2="800"/>
  </g>

  <!-- Ceiling/roof structure -->
  <g stroke="#c9c3b8" stroke-width="2" fill="none">
    <!-- Trusses -->
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <g stroke="#c9c3b8" stroke-width="1.5">
      <line x1="100" y1="100" x2="100" y2="140"/>
      <line x1="200" y1="100" x2="200" y2="140"/>
      <line x1="300" y1="100" x2="300" y2="140"/>
      <line x1="400" y1="100" x2="400" y2="140"/>
      <line x1="500" y1="100" x2="500" y2="140"/>
      <line x1="600" y1="100" x2="600" y2="140"/>
      <line x1="700" y1="100" x2="700" y2="140"/>
      <line x1="800" y1="100" x2="800" y2="140"/>
      <line x1="900" y1="100" x2="900" y2="140"/>
      <line x1="1000" y1="100" x2="1000" y2="140"/>
      <line x1="1100" y1="100" x2="1100" y2="140"/>
      <!-- Diagonal bracing -->
      <line x1="100" y1="140" x2="200" y2="100"/>
      <line x1="300" y1="140" x2="400" y2="100"/>
      <line x1="500" y1="140" x2="600" y2="100"/>
      <line x1="700" y1="140" x2="800" y2="100"/>
      <line x1="900" y1="140" x2="1000" y2="100"/>
    </g>
    <!-- Hanging lights -->
    <g>
      <line x1="200" y1="140" x2="200" y2="180"/>
      <circle cx="200" cy="190" r="14" fill="#b8965a" stroke="none"/>
      <line x1="500" y1="140" x2="500" y2="180"/>
      <circle cx="500" cy="190" r="14" fill="#b8965a" stroke="none"/>
      <line x1="800" y1="140" x2="800" y2="180"/>
      <circle cx="800" cy="190" r="14" fill="#b8965a" stroke="none"/>
      <line x1="1100" y1="140" x2="1100" y2="180"/>
      <circle cx="1100" cy="190" r="14" fill="#b8965a" stroke="none"/>
    </g>
  </g>

  <!-- Back wall windows -->
  <g stroke="#c9c3b8" stroke-width="1.5" fill="#fff">
    <rect x="120" y="320" width="80" height="140"/>
    <line x1="160" y1="320" x2="160" y2="460" stroke="#c9c3b8"/>
    <line x1="120" y1="390" x2="200" y2="390" stroke="#c9c3b8"/>
    <rect x="240" y="320" width="80" height="140"/>
    <line x1="280" y1="320" x2="280" y2="460" stroke="#c9c3b8"/>
    <line x1="240" y1="390" x2="320" y2="390" stroke="#c9c3b8"/>
    <rect x="900" y="320" width="80" height="140"/>
    <line x1="940" y1="320" x2="940" y2="460" stroke="#c9c3b8"/>
    <line x1="900" y1="390" x2="980" y2="390" stroke="#c9c3b8"/>
    <rect x="1020" y="320" width="80" height="140"/>
    <line x1="1060" y1="320" x2="1060" y2="460" stroke="#c9c3b8"/>
    <line x1="1020" y1="390" x2="1100" y2="390" stroke="#c9c3b8"/>
  </g>

  <!-- CNC MACHINE — center -->
  <g transform="translate(450, 380)">
    <!-- Base -->
    <rect x="0" y="180" width="300" height="40" stroke="#0e0e0e" stroke-width="2.5" fill="#1a1a1a"/>
    <!-- Body cabinet -->
    <rect x="20" y="60" width="260" height="120" stroke="#0e0e0e" stroke-width="2.5" fill="#fff"/>
    <!-- Window pane -->
    <rect x="50" y="80" width="200" height="80" stroke="#0e0e0e" stroke-width="1.5" fill="#0e0e0e" opacity="0.85"/>
    <!-- Spindle (red square inside the window) -->
    <g transform="translate(140, 95)">
      <rect x="0" y="0" width="20" height="20" fill="#b8965a"/>
      <line x1="10" y1="20" x2="10" y2="35" stroke="#b8965a" stroke-width="2"/>
      <rect x="6" y="35" width="8" height="14" fill="#888"/>
    </g>
    <!-- Workpiece on bed (drawer slide being machined) -->
    <rect x="70" y="148" width="160" height="8" fill="#888"/>
    <!-- Top arch / overhang -->
    <rect x="0" y="40" width="300" height="20" stroke="#0e0e0e" stroke-width="2.5" fill="#0e0e0e"/>
    <!-- Control panel on right -->
    <rect x="280" y="80" width="60" height="100" stroke="#0e0e0e" stroke-width="2" fill="#fff"/>
    <rect x="290" y="90" width="40" height="30" fill="#0e0e0e"/>
    <circle cx="300" cy="140" r="5" fill="#b8965a"/>
    <circle cx="320" cy="140" r="5" stroke="#0e0e0e" stroke-width="1.5" fill="none"/>
    <circle cx="300" cy="160" r="5" stroke="#0e0e0e" stroke-width="1.5" fill="none"/>
    <circle cx="320" cy="160" r="5" stroke="#0e0e0e" stroke-width="1.5" fill="none"/>
    <!-- Caution stripes on base -->
    <g fill="#b8965a">
      <rect x="0" y="220" width="300" height="6"/>
    </g>
  </g>

  <!-- LATHE — left side -->
  <g transform="translate(80, 480)">
    <!-- Base -->
    <rect x="0" y="60" width="220" height="30" stroke="#0e0e0e" stroke-width="2" fill="#1a1a1a"/>
    <!-- Headstock -->
    <rect x="0" y="20" width="60" height="50" stroke="#0e0e0e" stroke-width="2" fill="#fff"/>
    <circle cx="30" cy="45" r="10" stroke="#0e0e0e" stroke-width="1.5" fill="#b8965a"/>
    <!-- Bed/workpiece -->
    <line x1="60" y1="45" x2="180" y2="45" stroke="#0e0e0e" stroke-width="3"/>
    <rect x="100" y="38" width="40" height="14" fill="#888" stroke="#0e0e0e"/>
    <!-- Tailstock -->
    <rect x="180" y="30" width="40" height="40" stroke="#0e0e0e" stroke-width="2" fill="#fff"/>
  </g>

  <!-- CONVEYOR — right side -->
  <g transform="translate(820, 480)">
    <!-- Belt -->
    <rect x="0" y="40" width="280" height="20" stroke="#0e0e0e" stroke-width="2" fill="#0e0e0e"/>
    <!-- Belt rollers -->
    <circle cx="20" cy="50" r="14" stroke="#0e0e0e" stroke-width="2" fill="#fff"/>
    <circle cx="20" cy="50" r="4" fill="#b8965a"/>
    <circle cx="260" cy="50" r="14" stroke="#0e0e0e" stroke-width="2" fill="#fff"/>
    <circle cx="260" cy="50" r="4" fill="#b8965a"/>
    <!-- Items on belt (boxes / parts) -->
    <rect x="50" y="20" width="40" height="20" stroke="#0e0e0e" stroke-width="1.5" fill="#fff"/>
    <rect x="110" y="20" width="40" height="20" stroke="#0e0e0e" stroke-width="1.5" fill="#fff"/>
    <rect x="170" y="20" width="40" height="20" stroke="#0e0e0e" stroke-width="1.5" fill="#fff"/>
    <!-- Support legs -->
    <line x1="40" y1="60" x2="40" y2="100" stroke="#0e0e0e" stroke-width="2"/>
    <line x1="240" y1="60" x2="240" y2="100" stroke="#0e0e0e" stroke-width="2"/>
  </g>

  <!-- Worker silhouette (small, for scale) -->
  <g transform="translate(380, 555)" stroke="#0e0e0e" stroke-width="2" fill="#0e0e0e">
    <circle cx="0" cy="0" r="6"/>
    <line x1="0" y1="6" x2="0" y2="35"/>
    <line x1="0" y1="14" x2="-10" y2="22"/>
    <line x1="0" y1="14" x2="10" y2="22"/>
    <line x1="0" y1="35" x2="-7" y2="55"/>
    <line x1="0" y1="35" x2="7" y2="55"/>
  </g>
  <g transform="translate(800, 555)" stroke="#0e0e0e" stroke-width="2" fill="#0e0e0e">
    <circle cx="0" cy="0" r="6"/>
    <line x1="0" y1="6" x2="0" y2="35"/>
    <line x1="0" y1="14" x2="-10" y2="22"/>
    <line x1="0" y1="14" x2="10" y2="22"/>
    <line x1="0" y1="35" x2="-7" y2="55"/>
    <line x1="0" y1="35" x2="7" y2="55"/>
  </g>

  <!-- Section label -->
  <g>
    <rect x="40" y="40" width="220" height="40" fill="#0e0e0e"/>
    <text x="60" y="66" fill="#fff" font-family="'Helvetica Neue', sans-serif" font-size="14" letter-spacing="3" font-weight="600">FACTORY FLOOR · CNC</text>
  </g>
</svg>
