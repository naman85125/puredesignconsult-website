<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="CAD design software interface illustration">
  <!-- Background -->
  <rect width="1200" height="900" fill="#0e0e0e"/>

  <!-- Monitor frame (subtle, suggests viewing through screen) -->
  <rect x="40" y="40" width="1120" height="820" rx="8" fill="#151515" stroke="#2a2a2a" stroke-width="2"/>

  <!-- CAD APP HEADER -->
  <rect x="40" y="40" width="1120" height="46" fill="#1c1c1c"/>
  <!-- Window dots -->
  <g>
    <circle cx="68" cy="63" r="6" fill="#b8965a"/>
    <circle cx="86" cy="63" r="6" fill="#3a3a3a"/>
    <circle cx="104" cy="63" r="6" fill="#3a3a3a"/>
  </g>
  <!-- Filename tab -->
  <g>
    <rect x="140" y="50" width="220" height="30" rx="3" fill="#0e0e0e"/>
    <text x="158" y="70" fill="#b8965a" font-family="'Helvetica Neue', monospace" font-size="12" letter-spacing="1">drawer-slide-rev3.sldprt</text>
  </g>
  <!-- Toolbar icons -->
  <g stroke="#888" stroke-width="1.5" fill="none">
    <rect x="400" y="56" width="18" height="18"/>
    <circle cx="438" cy="65" r="9"/>
    <path d="M468 56 L484 56 L484 74 L468 74 Z M476 50 L476 80"/>
    <line x1="510" y1="56" x2="510" y2="74"/>
    <line x1="500" y1="65" x2="520" y2="65"/>
    <path d="M548 56 L548 74 L538 65 Z"/>
    <rect x="578" y="58" width="14" height="14" rx="2"/>
  </g>

  <!-- LEFT SIDEBAR — feature tree -->
  <rect x="40" y="86" width="220" height="774" fill="#151515"/>
  <g fill="#888" font-family="'Helvetica Neue', monospace" font-size="11">
    <text x="60" y="120">▼ Drawer Slide v3</text>
    <text x="76" y="148">▼ Origin</text>
    <text x="92" y="172">⊥ Top Plane</text>
    <text x="92" y="192">⊥ Front Plane</text>
    <text x="92" y="212">⊥ Right Plane</text>
    <text x="76" y="244">▼ Outer Rail</text>
    <text x="92" y="268">⌗ Sketch1</text>
    <text x="92" y="288">▭ Extrude1 (560mm)</text>
    <text x="92" y="308">⌗ Sketch2</text>
    <text x="92" y="328">▭ Cut-Extrude1</text>
    <text x="76" y="360">▼ Middle Rail</text>
    <text x="92" y="384">⌗ Sketch3</text>
    <text x="92" y="404">▭ Extrude2</text>
    <text x="92" y="424">⊕ Pattern (12)</text>
    <text x="76" y="456">▼ Bearings</text>
    <text x="92" y="480">○ Sphere1 (R=3)</text>
    <text x="92" y="500">⊕ Linear Pattern</text>
    <text x="76" y="532">▶ Mounting Holes</text>
    <text x="76" y="556">▶ Fillets</text>
    <text x="76" y="580">▶ Material</text>
  </g>
  <!-- Active item highlight -->
  <rect x="60" y="376" width="190" height="20" fill="#b8965a" opacity="0.18"/>

  <!-- VIEWPORT -->
  <rect x="260" y="86" width="780" height="710" fill="#1a1a1a"/>

  <!-- Viewport grid (perspective-style) -->
  <g stroke="#2a2a2a" stroke-width="1">
    <!-- Horizontal grid lines -->
    <line x1="280" y1="500" x2="1020" y2="500"/>
    <line x1="280" y1="540" x2="1020" y2="540"/>
    <line x1="280" y1="580" x2="1020" y2="580"/>
    <line x1="280" y1="620" x2="1020" y2="620"/>
    <line x1="280" y1="660" x2="1020" y2="660"/>
    <line x1="280" y1="700" x2="1020" y2="700"/>
    <line x1="280" y1="740" x2="1020" y2="740"/>
    <!-- Vertical grid lines -->
    <line x1="320" y1="460" x2="320" y2="780"/>
    <line x1="400" y1="460" x2="400" y2="780"/>
    <line x1="480" y1="460" x2="480" y2="780"/>
    <line x1="560" y1="460" x2="560" y2="780"/>
    <line x1="640" y1="460" x2="640" y2="780"/>
    <line x1="720" y1="460" x2="720" y2="780"/>
    <line x1="800" y1="460" x2="800" y2="780"/>
    <line x1="880" y1="460" x2="880" y2="780"/>
    <line x1="960" y1="460" x2="960" y2="780"/>
  </g>

  <!-- Origin axes (gizmo) -->
  <g stroke-width="2.5" fill="none">
    <!-- X axis (red) -->
    <line x1="650" y1="600" x2="730" y2="600" stroke="#d4584c"/>
    <text x="734" y="604" fill="#d4584c" font-family="sans-serif" font-size="14" font-weight="700">X</text>
    <!-- Y axis (green) -->
    <line x1="650" y1="600" x2="650" y2="520" stroke="#4ca06a"/>
    <text x="640" y="510" fill="#4ca06a" font-family="sans-serif" font-size="14" font-weight="700">Y</text>
    <!-- Z axis (blue, into screen — angled) -->
    <line x1="650" y1="600" x2="600" y2="640" stroke="#5a8fd4"/>
    <text x="585" y="650" fill="#5a8fd4" font-family="sans-serif" font-size="14" font-weight="700">Z</text>
  </g>

  <!-- DRAWER SLIDE 3D wireframe (isometric) -->
  <g stroke="#e8e8e8" stroke-width="1.8" fill="none" transform="translate(390, 280)">
    <!-- Outer rail — extruded box (front face) -->
    <path d="M0 80 L520 80 L520 130 L0 130 Z"/>
    <!-- Back face (offset for depth) -->
    <path d="M40 60 L560 60 L560 110 L40 110"/>
    <!-- Connecting depth lines -->
    <line x1="0" y1="80" x2="40" y2="60"/>
    <line x1="520" y1="80" x2="560" y2="60"/>
    <line x1="520" y1="130" x2="560" y2="110"/>
    <line x1="0" y1="130" x2="40" y2="110"/>

    <!-- Inner channel (slide track) -->
    <path d="M30 95 L490 95 L490 115 L30 115 Z" stroke="#888"/>
    <path d="M60 80 L60 130 M120 80 L120 130 M180 80 L180 130 M240 80 L240 130 M300 80 L300 130 M360 80 L360 130 M420 80 L420 130 M480 80 L480 130" stroke="#444" stroke-width="1"/>

    <!-- Bearing balls on track -->
    <g fill="#b8965a" stroke="none">
      <circle cx="80" cy="105" r="4"/>
      <circle cx="140" cy="105" r="4"/>
      <circle cx="200" cy="105" r="4"/>
      <circle cx="260" cy="105" r="4"/>
      <circle cx="320" cy="105" r="4"/>
      <circle cx="380" cy="105" r="4"/>
      <circle cx="440" cy="105" r="4"/>
    </g>

    <!-- Mounting holes -->
    <ellipse cx="20" cy="105" rx="4" ry="3"/>
    <ellipse cx="500" cy="105" rx="4" ry="3"/>

    <!-- Selected face highlight -->
    <path d="M0 80 L520 80 L520 130 L0 130 Z" stroke="#b8965a" stroke-width="2.5" stroke-dasharray="6,3"/>

    <!-- Dimension lines -->
    <g stroke="#b8965a" stroke-width="1">
      <line x1="0" y1="160" x2="520" y2="160"/>
      <line x1="0" y1="156" x2="0" y2="164"/>
      <line x1="520" y1="156" x2="520" y2="164"/>
      <line x1="585" y1="60" x2="585" y2="110"/>
      <line x1="581" y1="60" x2="589" y2="60"/>
      <line x1="581" y1="110" x2="589" y2="110"/>
    </g>
    <text x="240" y="178" fill="#b8965a" font-family="sans-serif" font-size="13" font-weight="600">560.00</text>
    <text x="595" y="90" fill="#b8965a" font-family="sans-serif" font-size="13" font-weight="600">36.0</text>
  </g>

  <!-- Section view callout -->
  <g stroke="#b8965a" stroke-width="1.5" fill="none">
    <line x1="280" y1="320" x2="320" y2="320" stroke-dasharray="4,3"/>
    <line x1="320" y1="320" x2="370" y2="370" stroke-dasharray="4,3"/>
    <text x="280" y="310" fill="#b8965a" font-family="sans-serif" font-size="12" font-weight="600">A</text>
    <text x="362" y="362" fill="#b8965a" font-family="sans-serif" font-size="12" font-weight="600">A'</text>
  </g>

  <!-- VIEW CUBE (top right of viewport) -->
  <g stroke="#888" stroke-width="1.5" fill="none" transform="translate(950, 110)">
    <path d="M0 20 L40 0 L80 20 L80 60 L40 80 L0 60 Z" fill="#2a2a2a"/>
    <path d="M0 20 L40 40 L80 20"/>
    <path d="M40 40 L40 80"/>
    <text x="35" y="32" fill="#b8965a" font-family="sans-serif" font-size="9" font-weight="700">FRONT</text>
  </g>

  <!-- PROPERTIES PANEL — right -->
  <rect x="1040" y="86" width="120" height="710" fill="#151515"/>
  <g fill="#888" font-family="'Helvetica Neue', monospace" font-size="10">
    <text x="1056" y="116">PROPERTIES</text>
    <line x1="1056" y1="124" x2="1144" y2="124" stroke="#2a2a2a"/>
    <text x="1056" y="148">Material</text>
    <text x="1056" y="164" fill="#fff">Steel SUS304</text>
    <text x="1056" y="196">Mass</text>
    <text x="1056" y="212" fill="#fff">412.6 g</text>
    <text x="1056" y="244">Volume</text>
    <text x="1056" y="260" fill="#fff">52,608 mm³</text>
    <text x="1056" y="292">Surface</text>
    <text x="1056" y="308" fill="#fff">42,150 mm²</text>
    <text x="1056" y="340">Tolerance</text>
    <text x="1056" y="356" fill="#fff">±0.05 mm</text>
    <text x="1056" y="388">Finish</text>
    <text x="1056" y="404" fill="#fff">Brushed Ni</text>
  </g>
  <!-- Color swatch -->
  <rect x="1056" y="430" width="20" height="20" fill="#b8965a"/>
  <rect x="1080" y="430" width="20" height="20" fill="#888"/>
  <rect x="1104" y="430" width="20" height="20" fill="#fff"/>
  <rect x="1128" y="430" width="16" height="20" fill="#0e0e0e" stroke="#888"/>

  <!-- BOTTOM STATUS BAR -->
  <rect x="40" y="800" width="1120" height="60" fill="#1c1c1c"/>
  <g fill="#888" font-family="'Helvetica Neue', monospace" font-size="11">
    <text x="280" y="824">Editing Sketch3</text>
    <text x="280" y="844" fill="#b8965a">● Fully Defined</text>
    <text x="500" y="824">Units: MMGS</text>
    <text x="500" y="844">Tolerance: ±0.01</text>
    <text x="700" y="824">Origin: 0, 0, 0</text>
    <text x="700" y="844">Camera: ISO</text>
    <text x="900" y="824">Layer: PART_001</text>
    <text x="900" y="844" fill="#fff">v3.0 — May 2026</text>
  </g>
</svg>
